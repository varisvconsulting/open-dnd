<!DOCTYPE html>
<html>
<head>
    <title>Page Title</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.1, maximum-scale=3.0, user-scalable=yes">
</head>
<body>

<div class="head_banner">
    <div class="header_tab">
        <button data_group="backgrounds" class="tab_button">backgrounds</button>
        <button data_group="playable_races" class="tab_button">playable races</button>
        <button data_group="classes" class="tab_button">classes</button>
        <button data_group="feats" class="tab_button">feats</button>
        <button data_group="items" class="tab_button">items</button>
        <button data_group="spells" class="tab_button active">spells</button>
    </div>

    <!-- items -->
    <div class="item_tab_buttons" style="display: none;">
        <div class="item_button_hbox">
            <button data-group="0" class="tab_button items_tab_button active">weapons</button>
            <button data-group="0" class="tab_button items_tab_button">armor</button>
            <button data-group="0" class="tab_button items_tab_button">shields</button>
            <button data-group="0" class="tab_button items_tab_button">consumables</button>
        </div>
        <div class="weapon_tab_buttons">
            <div class="row-box">
                <label>weapon category</label>
                <select data-weapon-category-filter="category" class="data-filter-dropdown">
                    <option value="all" selected>All</option>
                    <option value="simple">Simple</option>
                    <option value="martial">Martial</option>
                </select>
                <label>weapon group</label>
                <select data-weapon-group-filter="group" class="data-filter-dropdown">
                    <option selected>All</option>
                    <option>Simple</option>
                    <option>Martial</option>
                </select>
            </div>
        </div>
    </div>

    <div id="class_tab_buttons" class="class_tab_buttons" style="display:none">
    </div>
</div>
    
<div class="large_main_menu large_main_menu_spells">
    <div class="spell_tab_buttons">
        <button id="spell-opt-btn-grid" class="tab_button">▦ Grid</button>
        <button id="spell-opt-btn-list" class="tab_button active">≡ List</button>
        <input type="text" id="spell-search-input" placeholder="Search..." />
    </div>
    <div class="spell_tab_large_list">
        <!-- spells -->
        <aside class="list-panel">
            <div class="spell_tab_buttons">
                <button data-group="all" class="active tab_button category active">all</button>
                <button data-group="arcane" class="tab_button category">arcane</button>
                <button data-group="oath" class="tab_button category">oath</button>
                <button data-group="mystic" class="tab_button category">mystic</button>
                <button data-group="occult" class="tab_button category">occult</button>
            </div>
            <div class="spell_tab_buttons">
                <button data-group="0" class="tab_button level active">all</button>
                <button data-group="0" class="tab_button level">cantrips</button>
                <button data-group="1" class="tab_button level">1</button>
                <button data-group="2" class="tab_button level">2</button>
                <button data-group="3" class="tab_button level">3</button>
                <button data-group="4" class="tab_button level">4</button>
                <button data-group="5" class="tab_button level">5</button>
                <button data-group="6" class="tab_button level">6</button>
            </div>
            <div id="spell_tab_list" class="spell_tab_list"></div>
        </aside>
        <div id="spell_tab_list_card">[spell list menu]</div>
    </div>

    <div class="spell_tab_large_grid" style="display: none">
        <div class="spell_tab_buttons">
            <button data-group="all" class="active tab_button category">all</button>
            <button data-group="arcane" class="tab_button category">arcane</button>
            <button data-group="oath" class="tab_button category">oath</button>
            <button data-group="mystic" class="tab_button category">mystic</button>
            <button data-group="occult" class="tab_button category">occult</button>
        </div>
        <div class="spell_tab_buttons">
            <button data-group="0" class="tab_button level active">all</button>
            <button data-group="0" class="tab_button level">cantrips</button>
            <button data-group="1" class="tab_button level">1</button>
            <button data-group="2" class="tab_button level">2</button>
            <button data-group="3" class="tab_button level">3</button>
            <button data-group="4" class="tab_button level">4</button>
            <button data-group="5" class="tab_button level">5</button>
            <button data-group="6" class="tab_button level">6</button>
        </div>
        <div id="spell-grid" class="spell-grid">[spell list menu]</div>
    </div>
</div>

<div class="large_main_menu large_main_menu_backgrounds" style="display: none;">
    <div id="background-list" class="background_list">[background menu]</div>
</div>

<div class="large_main_menu large_main_menu_weapons" style="display: none;">
    <div id="weapons-list" class="weapons-list">[weapon menu]</div>
    <div id="armor-list" class="armor-list">[armor menu]</div>
    <div id="shield-list" class="shield-list">[shield menu]</div>
</div>

<div class="large_main_menu large_main_menu_player_races" style="display: none;">
    <div id="race-list" class="race-list">[player race menu]</div>
</div>

<div class="large_main_menu large_main_menu_classes" style="display:none">
    <div id="char_class_display"></div>
</div>


<script src="utils.js"></script>
<script src="backgrounds.js"></script>
<script src="spells.js"></script>
<script src="player_races.js"></script>
<script src="items.js"></script>
<script src="char_classes.js"></script>

<script>

    var selector_class = "all";
    var selector_lvl = "all";


    document.addEventListener('DOMContentLoaded', async() => {
        try {
            console.log("DOMContentLoaded")
            const data = initialSpellSetup();
            const data2 = initialRaceSetup();
            const data3 = initialBackgroundSetup();
            const data4 = initialItemsSetup();
            const data5 = initialCharClassSetup();
        } catch(e) {
            console.log(e);
        }
    });

    document.querySelectorAll('.header_tab .tab_button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.header_tab .tab_button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active')
            clearMenus()
            var selected = btn.textContent;
            switch(selected) {
                 case 'backgrounds':
                    setVisibleByClass('.large_main_menu_backgrounds', true)
                    break;
                case 'playable races':
                    setVisibleByClass('.large_main_menu_player_races', true)
                    break;
                case 'classes':
                    setVisibleByClass('.large_main_menu_classes', true);
                    setVisibleByClass('.class_tab_buttons', true, "flex");
                    break;
                case 'feats':
                    break;
                case 'items':
                    setVisibleByClass(".large_main_menu_weapons", true)
                    setVisibleByClass(".item_tab_buttons", true);
                    break;
                case 'spells':
                    setVisibleByClass('.large_main_menu_spells')
                    setVisibleByClass('.spell_tab_buttons', true, "flex")
                    break;
            }
        })
    });

    function clearMenus(){
        setVisibleByClass('.large_main_menu', false);
        setVisibleByClass('.spell_tab_buttons', false);
        setVisibleByClass('.item_tab_buttons', false);
        setVisibleByClass('.class_tab_buttons', false);
    }

    function setVisibleByClass(c_str, visible = true, override = ""){
        document.querySelectorAll(c_str).forEach(ob => {
            if (visible) {
                if (isEmptyValue(override)) {
                    ob.style.display = "inline";
                    
                } else {
                    ob.style.display = String(override);
                }
            } else {
                ob.style.display = "none"
            }
        });
    }

    function isEmptyValue(value) {
        if (value === null || value === undefined) return true;
        return String(value).trim() === "";
    }
</script>

</body>
</html>
