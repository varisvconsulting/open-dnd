<script>

    var selector_class = "all";
    var selector_lvl = "all";


    document.addEventListener('DOMContentLoaded', async() => {
        try {
            console.log("DOMContentLoaded")
            const data = initialSpellSetup();
            const data2 = initialRaceSetup();
            const data3 = initialBackgroundSetup();
            const data4 = initialWeaponsSetup();
        } catch(e) {
            console.log(e);
        }
    });

    document.querySelectorAll('.spell_tab_buttons .category').forEach(btn => {
        btn.addEventListener('click', () => {
            // retain active for css
            document.querySelectorAll('.spell_tab_buttons .category').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selector_class = btn.textContent;
            var c = fillSpellCards(selector_class,selector_lvl);
            console.log("selector pressed");
            
        });
    });

    document.querySelectorAll('.spell_tab_buttons .level').forEach(btn => {
        btn.addEventListener('click', () => {
            // retain active for css
            document.querySelectorAll('.spell_tab_buttons .level').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            var lvl = "0";
            if (btn.textContent == "cantrips") {selector_lvl = 0}
            else {
                selector_lvl = btn.textContent;
            }
            var c = fillSpellCards(selector_class,selector_lvl);
            console.log("selector pressed");
            
        });
    });

    document.querySelectorAll('.header_tab .tab_button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.header_tab .tab_button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active')
            clearMenus()
            var selected = btn.textContent;
            switch(selected) {
                 case 'backgrounds':
                    setVisibleByClass('.large_main_menu_backgrounds', true)
                    break;
                case 'playable races':
                    setVisibleByClass('.large_main_menu_player_races', true)
                    break;
                case 'classes':
                    break;
                case 'feats':
                    break;
                case 'items':
                    setVisibleByClass(".large_main_menu_weapons", true)
                    setVisibleByClass(".item_tab_buttons", true, "flex")
                    setVisibleByClass(".weapon_tab_buttons", true, "flex")
                    break;
                case 'spells':
                    setVisibleByClass('.large_main_menu_spells')
                    setVisibleByClass('.spell_tab_buttons', true, "flex")
                    break;
            }
        })
    });

    function clearMenus(){
        setVisibleByClass('.large_main_menu', false);
        setVisibleByClass('.spell_tab_buttons', false);
        setVisibleByClass('.item_tab_buttons', false);
        setVisibleByClass('.weapon_tab_buttons', false);
    }

    function setVisibleByClass(c_str, visible = true, override = ""){
        document.querySelectorAll(c_str).forEach(ob => {
            if (visible) {
                if (isEmptyValue(override)) {
                    ob.style.display = "inline"
                } else {
                    ob.style.display = String(override)
                }
            } else {
                ob.style.display = "none"
            }
        });
    }

    function isEmptyValue(value) {
        if (value === null || value === undefined) return true;
        console.log(String(value).trim() === "");
        return String(value).trim() === "";
    }
</script>
